<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 760" font-family="Inter, Arial, sans-serif" style="background-color: #ffffff;">
  <!-- Solid white background -->
  <rect x="0" y="0" width="1100" height="760" fill="#ffffff"/>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#374151"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="40" y="36" font-size="22" font-weight="700" fill="#111827">3-Tier AWS Architecture</text>
  <text x="40" y="56" font-size="13" fill="#6b7280">Highly available web application across two Availability Zones, provisioned with Terraform</text>

  <!-- User -->
  <circle cx="60" cy="170" r="18" fill="#ffffff" stroke="#374151" stroke-width="1.5"/>
  <text x="60" y="174" font-size="12" font-weight="600" fill="#111827" text-anchor="middle">User</text>
  <text x="60" y="205" font-size="10" fill="#6b7280" text-anchor="middle">Internet</text>

  <!-- Arrow user -> IGW -->
  <line x1="80" y1="170" x2="155" y2="170" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="90" y="162" font-size="10" fill="#4b5563" font-weight="500">HTTPS / HTTP</text>

  <!-- IGW -->
  <rect x="160" y="150" width="80" height="40" fill="#ffffff" stroke="#374151" stroke-width="1.5" rx="6"/>
  <text x="200" y="168" font-size="12" font-weight="600" fill="#111827" text-anchor="middle">IGW</text>
  <text x="200" y="182" font-size="10" fill="#4b5563" text-anchor="middle">Internet Gateway</text>

  <!-- VPC outer box -->
  <rect x="260" y="100" width="780" height="600" fill="none" stroke="#1f2937" stroke-width="2" stroke-dasharray="6 4" rx="10"/>
  <text x="275" y="125" font-size="13" font-weight="700" fill="#111827">VPC  (10.0.0.0/16)</text>

  <!-- AZ divider -->
  <line x1="660" y1="140" x2="660" y2="680" stroke="#d1d5db" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="430" y="148" font-size="12" font-weight="600" fill="#4b5563" letter-spacing="0.5">Availability Zone A  (us-east-1a)</text>
  <text x="780" y="148" font-size="12" font-weight="600" fill="#4b5563" letter-spacing="0.5">Availability Zone B  (us-east-1b)</text>

  <!-- Public subnets -->
  <rect x="280" y="170" width="360" height="120" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5" rx="6"/>
  <text x="295" y="190" font-size="11" font-weight="600" fill="#374151">Public Subnet  (10.0.1.0/24)</text>

  <rect x="680" y="170" width="340" height="120" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5" rx="6"/>
  <text x="695" y="190" font-size="11" font-weight="600" fill="#374151">Public Subnet  (10.0.2.0/24)</text>

  <!-- ALB -->
  <rect x="430" y="210" width="440" height="60" fill="#ffffff" stroke="#374151" stroke-width="1.5" rx="6"/>
  <text x="650" y="232" font-size="12" font-weight="600" fill="#111827" text-anchor="middle">Application Load Balancer (ALB)</text>
  <text x="650" y="252" font-size="10" fill="#4b5563" text-anchor="middle">HTTP listener  -  Target group  -  Health checks</text>

  <!-- NAT GW -->
  <rect x="295" y="215" width="110" height="50" fill="#ffffff" stroke="#374151" stroke-width="1.5" rx="6"/>
  <text x="350" y="235" font-size="12" font-weight="600" fill="#111827" text-anchor="middle">NAT GW</text>
  <text x="350" y="252" font-size="10" fill="#4b5563" text-anchor="middle">Elastic IP</text>

  <!-- IGW -> public subnet arrow -->
  <line x1="240" y1="170" x2="280" y2="170" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Private app subnets -->
  <rect x="280" y="320" width="360" height="160" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" rx="6"/>
  <text x="295" y="340" font-size="11" font-weight="600" fill="#374151">Private App Subnet  (10.0.11.0/24)</text>

  <rect x="680" y="320" width="340" height="160" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" rx="6"/>
  <text x="695" y="340" font-size="11" font-weight="600" fill="#374151">Private App Subnet  (10.0.12.0/24)</text>

  <!-- EC2 instances AZ-A -->
  <rect x="320" y="360" width="120" height="50" fill="#ffffff" stroke="#374151" stroke-width="1.5" rx="6"/>
  <text x="380" y="382" font-size="12" font-weight="600" fill="#111827" text-anchor="middle">EC2 (ASG)</text>
  <text x="380" y="398" font-size="10" fill="#4b5563" text-anchor="middle">Amazon Linux 2023</text>

  <rect x="470" y="360" width="120" height="50" fill="#ffffff" stroke="#374151" stroke-width="1.5" rx="6"/>
  <text x="530" y="382" font-size="12" font-weight="600" fill="#111827" text-anchor="middle">EC2 (ASG)</text>
  <text x="530" y="398" font-size="10" fill="#4b5563" text-anchor="middle">Amazon Linux 2023</text>

  <!-- EC2 instances AZ-B -->
  <rect x="720" y="360" width="120" height="50" fill="#ffffff" stroke="#374151" stroke-width="1.5" rx="6"/>
  <text x="780" y="382" font-size="12" font-weight="600" fill="#111827" text-anchor="middle">EC2 (ASG)</text>
  <text x="780" y="398" font-size="10" fill="#4b5563" text-anchor="middle">Amazon Linux 2023</text>

  <rect x="870" y="360" width="120" height="50" fill="#ffffff" stroke="#374151" stroke-width="1.5" rx="6"/>
  <text x="930" y="382" font-size="12" font-weight="600" fill="#111827" text-anchor="middle">EC2 (ASG)</text>
  <text x="930" y="398" font-size="10" fill="#4b5563" text-anchor="middle">Amazon Linux 2023</text>

  <!-- ASG band -->
  <rect x="320" y="425" width="670" height="40" fill="#dbeafe" stroke="#3b82f6" stroke-width="1" rx="4"/>
  <text x="655" y="448" font-size="12" font-weight="600" fill="#111827" text-anchor="middle">Auto Scaling Group  (min: 2, desired: 2, max: 4)  -  Launch Template  -  IMDSv2 required</text>

  <!-- Private DB subnets -->
  <rect x="280" y="510" width="360" height="140" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" rx="6"/>
  <text x="295" y="530" font-size="11" font-weight="600" fill="#374151">Private DB Subnet  (10.0.21.0/24)</text>

  <rect x="680" y="510" width="340" height="140" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" rx="6"/>
  <text x="695" y="530" font-size="11" font-weight="600" fill="#374151">Private DB Subnet  (10.0.22.0/24)</text>

  <!-- RDS Primary -->
  <rect x="380" y="555" width="180" height="60" fill="#ffffff" stroke="#374151" stroke-width="1.5" rx="6"/>
  <text x="470" y="578" font-size="12" font-weight="600" fill="#111827" text-anchor="middle">RDS  -  Primary</text>
  <text x="470" y="595" font-size="10" fill="#4b5563" text-anchor="middle">MySQL 8.0  -  encrypted</text>

  <!-- RDS Standby -->
  <rect x="760" y="555" width="180" height="60" fill="#ffffff" stroke="#374151" stroke-width="1.5" rx="6"/>
  <text x="850" y="578" font-size="12" font-weight="600" fill="#111827" text-anchor="middle">RDS  -  Standby</text>
  <text x="850" y="595" font-size="10" fill="#4b5563" text-anchor="middle">Multi-AZ replica</text>

  <!-- Replication arrow -->
  <line x1="560" y1="585" x2="760" y2="585" stroke="#374151" stroke-width="2" stroke-dasharray="4 4" marker-end="url(#arrow)"/>
  <text x="610" y="578" font-size="10" fill="#4b5563" font-weight="500">Synchronous replication</text>

  <!-- Traffic arrows: ALB -> EC2 -->
  <line x1="600" y1="270" x2="450" y2="360" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="700" y1="270" x2="780" y2="360" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- EC2 -> RDS -->
  <line x1="450" y1="410" x2="470" y2="555" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="800" y1="410" x2="850" y2="555" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- EC2 -> NAT -->
  <line x1="380" y1="360" x2="355" y2="265" stroke="#374151" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrow)"/>
  <text x="200" y="320" font-size="10" fill="#4b5563" font-weight="500">Outbound only via NAT</text>

  <!-- Legend -->
  <text x="40" y="705" font-size="11" font-weight="700" fill="#111827">Tiers</text>
  <rect x="90" y="695" width="16" height="12" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text x="112" y="705" font-size="10" fill="#374151">Web / Public</text>
  <rect x="200" y="695" width="16" height="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="222" y="705" font-size="10" fill="#374151">App / Private</text>
  <rect x="320" y="695" width="16" height="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="342" y="705" font-size="10" fill="#374151">Database / Private isolated</text>
</svg>