# =========================================================
# HPA - scales pods automatically based on CPU
# =========================================================

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: aws-3tier-app
  namespace: aws-3tier-dev
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: aws-3tier-app
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70 # scale up when CPU hits 70%
