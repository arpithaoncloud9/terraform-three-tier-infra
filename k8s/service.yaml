# =========================================================
# Service - exposes pods to the ALB via NodePort
# =========================================================

apiVersion: v1
kind: Service
metadata:
  name: aws-3tier-app
  namespace: aws-3tier-dev
  labels:
    app: aws-3tier-app
    environment: dev
spec:
  type: NodePort
  selector:
    app: aws-3tier-app
  ports:
    - name: http
      protocol: TCP
      port: 80 # service port
      targetPort: 3000 # container port (matches your server.js PORT)
      nodePort: 30080 # fixed NodePort — ALB target group points here
